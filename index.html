function renderGrid(rows, pal, gw, gh) {
  const c = document.createElement("canvas");
  c.width = gw; c.height = gh;
  const g = c.getContext("2d");
  for (let y = 0; y < rows.length; y++) {
    const row = rows[y] || "";
    if (row.length > gw) console.warn("строка длиннее сетки:", y, row);
    for (let x = 0; x < Math.min(row.length, gw); x++) {
      const ch = row[x];
      if (ch === "." || ch === " ") continue;
      g.fillStyle = pal[ch] || "#ff00ff";  // маджента = опечатка в спрайте
      g.fillRect(x, y, 1, 1);
    }
  }
  return c;
}
function whiteCopy(img) {  // белая вспышка при попадании
  const c = document.createElement("canvas");
  c.width = img.width; c.height = img.height;
  const g = c.getContext("2d");
  g.drawImage(img, 0, 0);
  g.globalCompositeOperation = "source-in";
  g.fillStyle = "#ffffff";
  g.fillRect(0, 0, c.width, c.height);
  return c;
}
/* EPX/Scale2x (v0.6): умное удвоение пиксель-арта — «лесенки» на
   диагоналях сглаживаются, стиль сохраняется. Считаем один раз при
   сборке спрайта, в бою — обычный drawImage. */
function epx2(src) {
  const w = src.width, h = src.height;
  const s32 = new Uint32Array(
    src.getContext("2d").getImageData(0, 0, w, h).data.buffer);
  const dst = document.createElement("canvas");
  dst.width = w * 2; dst.height = h * 2;
  const g = dst.getContext("2d");
  const out = g.createImageData(w * 2, h * 2);
  const o32 = new Uint32Array(out.data.buffer);
  const at = (x, y) => (x < 0 || y < 0 || x >= w || y >= h) ? 0 : s32[y * w + x];
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const P = at(x, y), A = at(x, y - 1), B = at(x + 1, y),
            C = at(x - 1, y), D = at(x, y + 1);
      let e0 = P, e1 = P, e2 = P, e3 = P;
      if (C === A && C !== D && A !== B) e0 = A;
      if (A === B && A !== C && B !== D) e1 = B;
      if (D === C && D !== B && C !== A) e2 = C;
      if (B === D && B !== A && D !== C) e3 = D;
      const i = (y * 2) * (w * 2) + x * 2;
      o32[i] = e0; o32[i + 1] = e1;
      o32[i + w * 2] = e2; o32[i + w * 2 + 1] = e3;
    }
  }
  g.putImageData(out, 0, 0);
  return dst;
}
function shade(hex, k) {   // оттенок цвета: k>0 светлее, k<0 темнее
  const v = parseInt(hex.slice(1), 16);
  const f = sh => {
    let c = (v >> sh) & 255;
    c = (k >= 0) ? c + (255 - c) * k : c * (1 + k);
    return Math.round(c);
  };
  return "rgb(" + f(16) + "," + f(8) + "," + f(0) + ")";
}

    const hd = epx2(img);                    // сглаженная x2 версия
    FRAMES[key][fn] = { img: hd, white: whiteCopy(hd) };
  }
}

const ARENA = {
  name: "Храм: день и ночь",
  left: 60, right: WORLD_W - 60,
  buf: null, g: null, stars: [],
  /* ключевые кадры суток: t — фаза 0..1, amb — освещённость */
  SKY: [
    { t: 0.00, bands: ["#3b6ab0","#4b7ec4","#639ad6","#86bce6","#aad6ee","#cfe8f4"], amb: 1.00 },
    { t: 0.38, bands: ["#3b6ab0","#4b7ec4","#639ad6","#86bce6","#aad6ee","#cfe8f4"], amb: 1.00 },
    { t: 0.50, bands: ["#241a48","#3c2258","#642e5e","#96404f","#c65f45","#e8894a"], amb: 0.80 },
    { t: 0.60, bands: ["#0a0c20","#0e1130","#141740","#1a1e4e","#22265c","#2c2e6a"], amb: 0.42 },
    { t: 0.90, bands: ["#0a0c20","#0e1130","#141740","#1a1e4e","#22265c","#2c2e6a"], amb: 0.42 },
    { t: 0.97, bands: ["#4a2b63","#7c3a63","#a85555","#c87a52","#e0a060","#f0c080"], amb: 0.75 },
    { t: 1.00, bands: ["#3b6ab0","#4b7ec4","#639ad6","#86bce6","#aad6ee","#cfe8f4"], amb: 1.00 },
  ],
  BAND_Y: [0, 22, 44, 62, 76, 86, 92],
  init() {
    this.buf = document.createElement("canvas");
    this.buf.width = 240; this.buf.height = 135;
    this.g = this.buf.getContext("2d");
    let seed = 12345;
    for (let i = 0; i < 46; i++) {          // звёзды на фиксированных местах
      seed = (seed * 1103515245 + 12345) % 2147483648;
      const x = seed % 240;
      seed = (seed * 1103515245 + 12345) % 2147483648;
      this.stars.push({ x: x, y: seed % 80 });
    }
  },
  lerpHex(c1, c2, k) {
    const a = parseInt(c1.slice(1), 16), b = parseInt(c2.slice(1), 16);
    const r = Math.round(((a >> 16) & 255) + (((b >> 16) & 255) - ((a >> 16) & 255)) * k);
    const gg = Math.round(((a >> 8) & 255) + (((b >> 8) & 255) - ((a >> 8) & 255)) * k);
    const bb = Math.round((a & 255) + ((b & 255) - (a & 255)) * k);
    return "rgb(" + r + "," + gg + "," + bb + ")";
  },
  draw(t, themeIdx, camX) {
    const TH = THEMES[themeIdx || 0];
    const g = this.g;
    const phase = (t % CYCLE_LEN) / CYCLE_LEN;
    const K = this.SKY;
    let i = 0;
    while (i < K.length - 2 && phase > K[i + 1].t) i++;
    const k = (phase - K[i].t) / Math.max(1e-6, K[i + 1].t - K[i].t);
    const amb = K[i].amb + (K[i + 1].amb - K[i].amb) * k;
    const an = (amb - 0.42) / 0.58;               // 0 — ночь, 1 — день
    // небо полосами
    for (let b = 0; b < 6; b++) {
      g.fillStyle = this.lerpHex(K[i].bands[b], K[i + 1].bands[b], k);
      g.fillRect(0, this.BAND_Y[b], 240, this.BAND_Y[b + 1] - this.BAND_Y[b]);
    }
    // звёзды проступают ночью
    if (an < 0.85) {
      g.globalAlpha = Math.min(1, (0.85 - an) * 1.6);
      g.fillStyle = "#eef2ff";
      for (const st of this.stars) g.fillRect(st.x, st.y, 1, 1);
      g.globalAlpha = 1;
    }
    // солнце — первая половина суток, луна — вторая; путь по дуге
    const day = phase < 0.55;
    const p = day ? phase / 0.55 : (phase - 0.55) / 0.45;
    const cx = 26 + p * 188;
    const cy = 92 - Math.sin(Math.PI * p) * 58;
    if (day) {
      g.fillStyle = "#ffcf7e"; g.beginPath(); g.arc(cx, cy, 15, 0, 7); g.fill();
      g.fillStyle = "#ffe9b0"; g.beginPath(); g.arc(cx, cy, 10, 0, 7); g.fill();
    } else {
      g.fillStyle = "#e9edf5"; g.beginPath(); g.arc(cx, cy, 12, 0, 7); g.fill();
      g.fillStyle = "#c3cbdc";
      g.fillRect(cx - 5, cy - 3, 3, 3); g.fillRect(cx + 1, cy + 2, 2, 2);
      g.fillRect(cx + 3, cy - 6, 2, 2);
    }
    // горы и пол темнеют к ночи (солнце садится за горы)
    g.fillStyle = this.lerpHex(TH.mtN, TH.mtD, an);
    g.beginPath(); g.moveTo(0, 92); g.lineTo(38, 58); g.lineTo(84, 92); g.fill();
    g.beginPath(); g.moveTo(60, 92); g.lineTo(120, 48); g.lineTo(190, 92); g.fill();
    g.beginPath(); g.moveTo(160, 92); g.lineTo(214, 62); g.lineTo(240, 92); g.fill();
    if (TH.decor === "torii") {
      g.fillStyle = this.lerpHex("#0e0916", "#1c1226", an);
      g.fillRect(88, 44, 64, 6);
      g.fillRect(84, 42, 8, 8); g.fillRect(148, 42, 8, 8);
      g.fillRect(94, 56, 52, 5);
      g.fillRect(97, 44, 7, 48);
      g.fillRect(136, 44, 7, 48);
    } else if (TH.decor === "bamboo") {
      for (const bx of [16, 44, 78, 148, 188, 218]) {
        g.fillStyle = this.lerpHex("#1a2c16", "#3f6b33", an);
        g.fillRect(bx, 34, 5, 58);
        g.fillStyle = this.lerpHex("#101c0e", "#2c4a24", an);
        for (let jy = 42; jy < 92; jy += 13) g.fillRect(bx, jy, 5, 2);
      }
    } else if (TH.decor === "snow") {
      g.fillStyle = this.lerpHex("#6a7288", "#eef2fa", an);
      g.beginPath(); g.moveTo(28, 67); g.lineTo(38, 58); g.lineTo(48, 67); g.fill();
      g.beginPath(); g.moveTo(107, 58); g.lineTo(120, 48); g.lineTo(133, 58); g.fill();
      g.beginPath(); g.moveTo(203, 68); g.lineTo(214, 62); g.lineTo(225, 68); g.fill();
    }
    g.fillStyle = this.lerpHex(TH.grN, TH.grD, an); g.fillRect(0, 92, 240, 43);
    g.fillStyle = this.lerpHex(TH.edN, TH.edD, an); g.fillRect(0, 92, 240, 2);
    g.fillStyle = this.lerpHex(TH.lnN, TH.lnD, an);
    for (let x = 0; x < 240; x += 24) g.fillRect(x, 96, 1, 39);
    for (let y = 104; y < 135; y += 12) g.fillRect(0, y, 240, 1);
    // небо и горы «бесконечно далеко», пол скроллится плитками
    ctx.drawImage(this.buf, 0, 0, 240, 92, 0, 0, W, 368);
    for (let tx = 0; tx < WORLD_W; tx += W)
      ctx.drawImage(this.buf, 0, 92, 240, 43, tx - (camX || 0), 368, W, 172);
  }
};

function newPad() {

}

/* ---------- СЕНСОРНОЕ УПРАВЛЕНИЕ (v0.7) ----------------------
   Телефон/планшет: левая половина — плавающий стик (вверх прыжок,
   вниз щит), справа — шесть кнопок атак. Всё пишет в touchPad —
   ещё один источник HumanController, логика бойца не меняется. */
const touchPad = newPad();
const TOUCH_ON = ("ontouchstart" in window) || (navigator.maxTouchPoints > 0);
const FIGHT_MODES = { intro: 1, fight: 1, play: 1, ko: 1 };
const stick = { id: -1, ox: 0, oy: 0, dx: 0, dy: 0 };
const touches = new Map();               // pointerId -> точка на холсте
const TBTNS = [
  { a: "jab",      t: "ДЖЕБ"   }, { a: "heavy",  t: "СИЛЬН." },
  { a: "kick",     t: "НОГА"   }, { a: "sweep",  t: "ПОДН."  },
  { a: "shuriken", t: "СЮРИК." }, { a: "weapon", t: "ОРУЖ."  },
];
function tbtnRect(i) {
  const bw = 104, bh = 62, gap = 10;
  const col = i % 2, row = (i / 2) | 0;
  return { x: W - 16 - (2 - col) * (bw + gap) + gap,
           y: H - 16 - (3 - row) * (bh + gap) + gap, w: bw, h: bh };
}
function canvasXY(e) {
  const r = cv.getBoundingClientRect();
  return { x: (e.clientX - r.left) * W / r.width,
           y: (e.clientY - r.top) * H / r.height };
}
cv.addEventListener("pointerdown", e => {
  const p = canvasXY(e);
  if ((e.pointerType === "touch" || e.pointerType === "pen") &&
      FIGHT_MODES[game.mode]) {
    try { cv.setPointerCapture(e.pointerId); } catch (err) { /* ок */ }
    if (p.x < W * 0.44 && stick.id < 0) {
      stick.id = e.pointerId;
      stick.ox = p.x; stick.oy = p.y; stick.dx = stick.dy = 0;
    } else {
      touches.set(e.pointerId, p);
    }
    e.preventDefault();
    return;                              // в бою тап — не клик по меню
  }
  uiEvents.push({ type: "click", x: p.x, y: p.y });
});
cv.addEventListener("pointermove", e => {
  if (e.pointerId === stick.id) {
    const p = canvasXY(e);
    stick.dx = p.x - stick.ox; stick.dy = p.y - stick.oy;
  } else if (touches.has(e.pointerId)) {
    touches.set(e.pointerId, canvasXY(e));
  }
});
function endTouch(e) {
  if (e.pointerId === stick.id) { stick.id = -1; stick.dx = stick.dy = 0; }
  touches.delete(e.pointerId);
}
cv.addEventListener("pointerup", endTouch);
cv.addEventListener("pointercancel", endTouch);
function updateTouchPad() {              // каждый тик, до контроллеров
  for (const k in touchPad) touchPad[k] = false;
  if (stick.id >= 0) {
    if (stick.dx < -18) touchPad.left  = true;
    if (stick.dx >  18) touchPad.right = true;
    if (stick.dy < -34) touchPad.jump  = true;
    if (stick.dy >  34) touchPad.block = true;
  }
  for (const p of touches.values()) {
    for (let i = 0; i < TBTNS.length; i++) {
      const r = tbtnRect(i);
      if (p.x >= r.x && p.x <= r.x + r.w && p.y >= r.y && p.y <= r.y + r.h)
        touchPad[TBTNS[i].a] = true;
    }
  }
}
function clearPads() {   // от «залипания» клавиш при потере фокуса
  for (const k in keyPad1) { keyPad1[k] = false; keyPad2[k] = false; touchPad[k] = false; }
  stick.id = -1; stick.dx = stick.dy = 0; touches.clear();
}
window.addEventListener("blur", clearPads);

/* планка растёт: 80, 120, 160, ... опыта на уровень */
function xpNeed(level) { return 80 + (level - 1) * 40; }
function levelInfo(xp) {
  let level = 1, rest = xp;
  while (rest >= xpNeed(level)) { rest -= xpNeed(level); level++; }
  return { level: level, into: rest, need: xpNeed(level) };
}

/* ============================================================
   БОЕЦ — конечный автомат состояний.
   ============================================================ */
const ST = { IDLE:"idle", WALK:"walk", JUMP:"jump", KICK:"kick", SWEEP:"sweep",
             JAB:"jab", HEAVY:"heavy", BLOCK:"block",
             THROW:"throwA", WEAPON:"weapon", HIT:"hit", DOWN:"down",
             GETUP:"getup", KO:"ko" };

class Fighter {
  constructor(x, palName, name, ctrl) {
    this.pal = palName; this.name = name; this.ctrl = ctrl;
    this.weapon = "fist"; this.hook = false;
    this.maxHp = HP_MAX; this.dmgMul = 1;
    this.reset(x, 1);
  }
  reset(x, facing) {
    this.x = x; this.vx = 0; this.facing = facing;
    this.hp = this.maxHp;
    this.state = ST.IDLE; this.t = 0;
    this.yOff = 0; this.vy = 0;
    this.flash = 0; this.invuln = 0; this.shuCd = 0;
    this.wpnCd = 0; this.dispHp = this.maxHp;
    this.hitLanded = false; this.crateHit = false;
  }
  get busy() {
    return this.state !== ST.IDLE && this.state !== ST.WALK;
  }
  hurtbox() {
    const h = (this.state === ST.SWEEP) ? 64 :
              (this.state === ST.DOWN || this.state === ST.KO) ? 30 : 100;
    return { x: this.x - 22, y: GROUND - h + this.yOff, w: 44, h: h };
  }
  setState(s) { this.state = s; this.t = 0; this.hitLanded = false; this.crateHit = false; }

  update(world) {
    this.t++;
    if (this.flash > 0) this.flash--;
    if (this.invuln > 0) this.invuln--;
    if (this.shuCd > 0) this.shuCd--;
    if (this.wpnCd > 0) this.wpnCd--;
    this.dispHp += (this.hp - this.dispHp) * 0.06;

    const opp = world.opponent(this);
    const pad = this.ctrl.pad;

    switch (this.state) {
      case ST.IDLE:
      case ST.WALK: {
        // разворот к противнику — только когда свободен
        this.facing = (opp.x >= this.x) ? 1 : -1;
        let dir = 0;
        if (pad.left) dir -= 1;
        if (pad.right) dir += 1;
        this.vx = dir * 3.2;
        this.setStateKeep(dir !== 0 ? ST.WALK : ST.IDLE);
        if (pad.jump) {
          this.setState(ST.JUMP); this.vy = -13;
          this.vx = (pad.left ? -1 : pad.right ? 1 : 0) * 3.2;
          break;
        }
        if (pad.block) { this.setState(ST.BLOCK); break; }
        if (pad.jab)   { this.setState(ST.JAB);   break; }
        if (pad.heavy) { this.setState(ST.HEAVY); break; }
        if (pad.kick)  { this.setState(ST.KICK);  break; }
        if (pad.sweep) { this.setState(ST.SWEEP); break; }
        if (pad.shuriken && this.shuCd === 0) { this.setState(ST.THROW); break; }
        if (pad.weapon) {
          if (this.weapon === "fist") { this.setState(ST.HEAVY); break; }
          const wp = WEAPONS[this.weapon];
          if (wp.type !== "proj" || this.wpnCd === 0) { this.setState(ST.WEAPON); break; }
        }
        break;
      }
      case ST.KICK:
      case ST.SWEEP:
      case ST.JAB:
      case ST.HEAVY: {
        this.vx = 0;
        const a = ATK[this.state];
        const total = a.startup + a.active + a.recover;
        if (this.t > a.startup && this.t <= a.startup + a.active && !this.hitLanded) {
          world.tryHit(this, opp, a);
        }
        if (this.t >= total) this.setState(ST.IDLE);
        break;
      }
      case ST.JUMP: {   // лёгкое управление в воздухе
        if (pad.left)  this.vx = Math.max(this.vx - 0.3, -3.4);
        if (pad.right) this.vx = Math.min(this.vx + 0.3, 3.4);
        break;
      }
      case ST.BLOCK: {
        this.vx = 0;
        if (!pad.block) this.setState(ST.IDLE);
        break;
      }
      case ST.WEAPON: {
        this.vx = 0;
        const wp = WEAPONS[this.weapon];
        if (wp.type === "melee") {
          const total = wp.startup + wp.active + wp.recover;
          if (this.t > wp.startup && this.t <= wp.startup + wp.active && !this.hitLanded) {
            world.tryHit(this, opp, wp);
          }
          if (this.t >= total) this.setState(ST.IDLE);
        } else {
          if (this.t === wp.startup) {
            world.spawnProjectile(this, wp.proj);
            this.wpnCd = wp.cooldown;
          }
          if (this.t >= wp.startup + wp.recover) this.setState(ST.IDLE);
        }
        break;
      }
      case ST.THROW: {
        this.vx = 0;
        const a = ATK.throwA;
        if (this.t === a.startup) {
          world.spawnProjectile(this, "shuriken");
          this.shuCd = a.cooldown;
        }
        if (this.t >= a.startup + a.recover) this.setState(ST.IDLE);
        break;
      }
      case ST.HIT: {
        this.vx *= 0.85;
        if (this.t >= this.stunLeft) { this.setState(ST.IDLE); this.invuln = 10; }
        break;
      }
      case ST.DOWN: {
        this.vx *= 0.8;
        if (this.t >= 50) this.setState(ST.GETUP);
        break;
      }
      case ST.GETUP: {
        this.vx = 0;
        if (this.t >= 18) { this.setState(ST.IDLE); this.invuln = 25; }
        break;
      }
      case ST.KO: {
        this.vx *= 0.85;
        break;
      }
    }

    if (this.yOff < 0 || this.vy !== 0) {   // гравитация
      this.vy += 0.7; this.yOff += this.vy;
      if (this.yOff >= 0) {
        this.yOff = 0; this.vy = 0;
        if (this.state === ST.JUMP) this.setState(ST.IDLE);
      }
    }
    this.x += this.vx;
    if (this.x < ARENA.left) this.x = ARENA.left;
    if (this.x > ARENA.right) this.x = ARENA.right;
  }
  setStateKeep(s) {  // idle<->walk без сброса таймера анимации
    if (this.state !== s) { this.state = s; }
  }

  applyHit(a, fromX) {
    if (this.invuln > 0 || this.state === ST.KO || this.state === ST.DOWN) return false;
    if (this.state === ST.BLOCK && !a.knockdown) {   // щит! подножка пробивает
      this.vx = ((this.x >= fromX) ? 1 : -1) * (a.kb || 4) * 0.8;
      world.floater(this.x - camera.x, GROUND - 150, "БЛОК", "#7ba4f0");
      return true;
    }
    this.hp = Math.max(0, this.hp - a.dmg);
    world.floater(this.x - camera.x, GROUND - 172, "-" + a.dmg, "#ff6a5e");
    this.flash = 5;
    const dir = (this.x >= fromX) ? 1 : -1;
    this.vx = dir * a.kb;
    if (this.hp <= 0) { this.setState(ST.KO); return true; }
    if (a.knockdown) { this.setState(ST.DOWN); }
    else { this.setState(ST.HIT); this.stunLeft = a.stun; }
    return true;
  }

  frameName() {
    switch (this.state) {
      case ST.IDLE:  return "idle";
      case ST.WALK:  return (Math.floor(this.t / 8) % 2) ? "walk2" : "walk1";
      case ST.KICK: {
        const a = ATK.kick;
        return (this.t > a.startup && this.t <= a.startup + a.active) ? "kickB" : "kickA";
      }
      case ST.SWEEP: return "sweep";
      case ST.JUMP:  return "kickA";
      case ST.BLOCK: return "blockA";
      case ST.JAB:
        return (this.t > ATK.jab.startup) ? "throwA" : "idle";
      case ST.HEAVY:
        return (this.t > ATK.heavy.startup) ? "punchB" : "idle";
      case ST.WEAPON: {
        const wp = WEAPONS[this.weapon];
        const strike = (wp.type === "melee")
          ? (this.t > wp.startup && this.t <= wp.startup + wp.active)
          : (this.t > wp.startup);
        return wp.frames[strike ? 1 : 0];
      }
      case ST.THROW: return "throwA";
      case ST.HIT:   return "hit";
      case ST.DOWN:  return (this.t < 10) ? "hit" : "ko";
      case ST.GETUP: return "kickA";
      case ST.KO:    return "ko";
    }
    return "idle";
  }

  draw() {
    // мигание при неуязвимости после подъёма
    if (this.invuln > 0 && Math.floor(this.t / 3) % 2 === 0 &&
        (this.state === ST.IDLE || this.state === ST.WALK)) { /* видим через раз */ }
    const fr = FRAMES[this.pal][this.frameName()];
    const img = (this.flash > 0) ? fr.white : fr.img;
    const bob = (this.state === ST.IDLE && Math.floor(this.t / 30) % 2) ? S : 0;
    // тень
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.beginPath();
    ctx.ellipse(this.x, GROUND + 6, 34, 8, 0, 0, 7);
    ctx.fill();
    // спрайт с якорем и отражением
    ctx.save();
    ctx.translate(this.x, GROUND - GH * S + bob + this.yOff);
    if (this.facing < 0) ctx.scale(-1, 1);
    ctx.drawImage(img, -ANCHOR_X * S, 0, GW * S, GH * S);
    if (this.state === ST.BLOCK) {   // мерцание щита
      ctx.globalAlpha = 0.22 + 0.14 * Math.sin(this.t * 0.5);
      ctx.drawImage(fr.white, -ANCHOR_X * S, 0, GW * S, GH * S);
      ctx.globalAlpha = 1;
    }
    ctx.restore();
    if (this.state === ST.WEAPON && this.weapon === "hook" &&
        this.t > WEAPONS.hook.startup) {   // крюк в ударе
      ctx.save();
      ctx.translate(this.x + this.facing * 58, GROUND - 52 + this.yOff);
      if (this.facing < 0) ctx.scale(-1, 1);
      ctx.drawImage(HOOK_IMG, -10, -10, 21, 21);
      ctx.restore();
    }
    if (this.hook && this.state !== ST.DOWN && this.state !== ST.KO) {
      ctx.save();                    // жёлтый крюк вместо задней руки
      ctx.translate(this.x - this.facing * 30, GROUND - 58);
      if (this.facing < 0) ctx.scale(-1, 1);
      ctx.drawImage(HOOK_IMG, -10, -10, 21, 21);
      ctx.restore();
    }
  }
}

/* ---------- КОНТРОЛЛЕРЫ ------------------------------------- */
class HumanController {
  constructor(sources) { this.sources = sources; this.pad = newPad(); this.human = true; }
  update() {
    for (const k in this.pad) this.pad[k] = this.sources.some(s => s[k]);
  }
}
class AIController {
  /* ИИ честный: видит только позиции и состояния, ввод игрока
     не читает. Реакция и агрессия — из выбранной сложности. */
  constructor() { this.pad = newPad(); this.timer = 0; this.plan = 0;
    this.blockT = 0; this.combo = []; this.lastAtk = ""; }
  update(me, opp) {
    for (const k in this.pad) this.pad[k] = false;
    if (this.blockT > 0) { this.blockT--; this.pad.block = true; return; }
    if (me.busy) return;
    const D = DIFFS[profile.difficulty];
    const incoming = world.projectiles.some(p => p.owner !== me &&
      ((p.vx > 0) === (me.x > p.x)) && Math.abs(p.x - me.x) < 260);
    if (incoming && Math.random() < 0.5) { this.pad.jump = true; return; }
    this.timer--;
    if (this.timer <= 0 && this.combo.length === 0) {
      this.timer = D.react + Math.floor(Math.random() * 8);
      const dist = Math.abs(opp.x - me.x);
      const r = Math.random();
      if (dist > 300) {
        if (r < 0.30 && me.shuCd === 0) this.plan = 4;       // сюрикен
        else if (r < 0.30 + D.aggro)    this.plan = 1;       // вперёд
        else if (r < 0.90)              this.plan = 0;       // стоим
        else                            this.plan = 2;       // назад
      } else if (dist > 140) {
        if (r < D.aggro)   this.plan = 1;
        else if (r < 0.70) this.plan = 0;
        else if (r < 0.85 && me.shuCd === 0) this.plan = 4;
        else               this.plan = 2;
      } else {
        if (opp.state === ST.BLOCK && r < 0.60) { this.combo = []; this.plan = 5; }
        else if (r < 0.42) {                          // серия ударов
          const CB = [["jab","jab","heavy"], ["jab","kick","sweep"],
                      ["kick","heavy"], ["heavy","jab","sweep"],
                      ["jab","heavy","kick"]];
          this.combo = CB[Math.floor(Math.random() * CB.length)].slice();
          this.plan = 12;
        } else if (r < 0.86) {                        // одиночный, но не прошлый
          const singles = ["kick", "jab", "heavy", "sweep", "weapon"]
            .filter(m => m !== this.lastAtk &&
                         (m !== "weapon" || me.weapon !== "fist"));
          const pick = singles[Math.floor(Math.random() * singles.length)];
          this.plan = { kick:3, jab:7, heavy:8, sweep:5, weapon:6 }[pick];
          this.lastAtk = pick;
        } else if (r < 0.94) { this.blockT = 24; return; }
        else this.plan = 2;
      }
    }
    const towards = (opp.x >= me.x) ? "right" : "left";
    const away    = (opp.x >= me.x) ? "left" : "right";
    if (this.plan === 1) this.pad[towards] = true;
    if (this.plan === 2) this.pad[away] = true;
    if (this.plan === 3) { this.pad.kick = true; this.plan = 0; }
    if (this.plan === 4) { this.pad.shuriken = true; this.plan = 0; }
    if (this.plan === 5) { this.pad.sweep = true; this.plan = 0; }
    if (this.plan === 6) { this.pad.weapon = true; this.plan = 0; }
    if (this.plan === 7) { this.pad.jab = true; this.plan = 0; }
    if (this.plan === 8) { this.pad.heavy = true; this.plan = 0; }
    if (this.plan === 12 && this.combo.length) {   // серия: удар за ударом
      const m = this.combo.shift();
      this.pad[m] = true; this.lastAtk = m;
      if (this.combo.length === 0) { this.plan = 0; this.timer = 12; }
    }
  }
}

/* ============================================================
   МИР: снаряды, искры, проверка попаданий, тряска экрана.
   ============================================================ */
const world = {
  fighters: [], projectiles: [], sparks: [], floaters: [], shake: 0,
  crates: [], coinDrops: [], chips: [], crateTimer: 300,
  opponent(f) { return (f === this.fighters[0]) ? this.fighters[1] : this.fighters[0]; },
  overlap(A, B) {
    return A.x < B.x + B.w && A.x + A.w > B.x &&
           A.y < B.y + B.h && A.y + A.h > B.y;
  },
  attackBox(f, a) {
    const w = a.box.w, h = a.box.h;
    const x = (f.facing > 0) ? f.x + a.box.fx : f.x - a.box.fx - w;
    return { x: x, y: GROUND - a.box.fy - h + f.yOff, w: w, h: h };
  },
  tryHit(attacker, defender, a) {
    const box = this.attackBox(attacker, a);
    if (!attacker.crateHit) {          // ящик ломается тем же ударом
      for (const cr of this.crates) {
        if (cr.landed && this.overlap(box, this.crateBox(cr))) {
          attacker.crateHit = true;
          this.hitCrate(cr, attacker.x);
          break;
        }
      }
    }
    if (this.overlap(box, defender.hurtbox())) {
      attacker.hitLanded = true;
      const eff = (attacker.dmgMul !== 1)
        ? Object.assign({}, a, { dmg: Math.round(a.dmg * attacker.dmgMul) }) : a;
      const hit = defender.applyHit(eff, attacker.x);
      if (hit) {
        this.spark(defender.x + defender.facing * -10, GROUND - a.box.fy - 10);
        this.shake = a.knockdown ? 10 : 6;
      }
    }
  },
  spawnProjectile(f, kind) {
    const pr = PROJ[kind];
    this.projectiles.push({
      kind: kind,
      x: f.x + f.facing * 44, y: GROUND - 74,
      vx: f.facing * pr.speed, owner: f, alive: true, t: 0
    });
  },

  /* ---------- ящики с монетами (v0.6) ------------------------ */
  crateBox(cr) {
    return { x: cr.x - CR_GW * CR_S / 2, y: cr.y,
             w: CR_GW * CR_S, h: CR_GH * CR_S };
  },
  spawnCrate() {
    let x = 0;
    for (let tries = 0; tries < 12; tries++) {   // подальше от бойцов
      x = ARENA.left + 80 + Math.random() * (ARENA.right - ARENA.left - 160);
      const okF = this.fighters.every(f => Math.abs(f.x - x) > 110);
      const okC = this.crates.every(c => Math.abs(c.x - x) > 140);
      if (okF && okC) break;
    }
    this.crates.push({ x: x, y: -90, vy: 0, hp: CRATE_HP,
                       landed: false, flash: 0, dir: 1, alive: true });
  },
  rollRarity() {
    let r = Math.random() * 100;
    for (const ra of RARITIES) { r -= ra.weight; if (r < 0) return ra; }
    return RARITIES[RARITIES.length - 1];
  },
  hitCrate(cr, fromX) {
    cr.hp--; cr.flash = 6; cr.dir = (cr.x >= fromX) ? 1 : -1;
    this.spark(cr.x, cr.y + 20);
    if (cr.hp > 0) { this.shake = Math.max(this.shake, 3); return; }
    cr.alive = false;                       // ломаем: щепки + монета
    this.shake = Math.max(this.shake, 7);
    for (let i = 0; i < 10; i++) {
      this.chips.push({ x: cr.x + (Math.random() - 0.5) * 50,
        y: cr.y + 14 + Math.random() * 40,
        vx: (Math.random() - 0.5) * 6, vy: -2 - Math.random() * 4,
        t: 0, c: (i % 2) ? "#c78757" : "#7a4e28" });
    }
    const rar = this.rollRarity();
    this.coinDrops.push({ x: cr.x, y: cr.y + 20, vx: (Math.random() - 0.5) * 2,
                          vy: -6.5, rar: rar, t: 0, alive: true });
    this.floater(cr.x - camera.x, cr.y - 6, rar.name + "!", rar.color);
    if (rar.coins >= 20) {                  // фейерверк для топ-редкостей
      for (let i = 0; i < 8; i++)
        this.spark(cr.x + (Math.random() - 0.5) * 70,
                   cr.y + (Math.random() - 0.5) * 60);
    }
  },
  floater(x, y, txt, color) {
    this.floaters.push({ x: x, y: y, txt: txt, color: color, t: 0 });
  },
  tickFloaters() {
    for (const fl of this.floaters) { fl.t++; fl.y -= 0.9; }
    this.floaters = this.floaters.filter(f => f.t < 45);
  },
  drawFloaters() {
    ctx.font = "bold 20px 'Courier New', monospace";
    ctx.textAlign = "center";
    for (const fl of this.floaters) {
      ctx.globalAlpha = Math.max(0, 1 - fl.t / 45);
      ctx.fillStyle = "#191722"; ctx.fillText(fl.txt, fl.x + 2, fl.y + 2);
      ctx.fillStyle = fl.color;  ctx.fillText(fl.txt, fl.x, fl.y);
      ctx.globalAlpha = 1;
    }
  },
  spark(x, y) { this.sparks.push({ x: x, y: y, t: 0 }); },

  update() {
    /* ящики: спавн и падение; монеты: физика и подбор (v0.6) */
    if (game.mode === "play") {
      if (this.crateTimer > 0) this.crateTimer--;
      if (this.crateTimer <= 0 && this.crates.length < 2) {
        this.spawnCrate();
        this.crateTimer = CRATE_GAP[0] +
          Math.floor(Math.random() * (CRATE_GAP[1] - CRATE_GAP[0]));
      }
    }
    for (const cr of this.crates) {
      if (cr.flash > 0) cr.flash--;
      if (!cr.landed) {
        cr.vy += 0.6; cr.y += cr.vy;
        const rest = GROUND - CR_GH * CR_S + 4;
        if (cr.y >= rest) {
          cr.y = rest; cr.landed = true;
          this.shake = Math.max(this.shake, 3);
          this.spark(cr.x - 26, GROUND - 6); this.spark(cr.x + 26, GROUND - 6);
        }
      }
    }
    this.crates = this.crates.filter(c => c.alive);
    for (const cd of this.coinDrops) {
      cd.t++;
      cd.vy += 0.45; cd.y += cd.vy; cd.x += cd.vx;
      if (cd.x < ARENA.left) cd.x = ARENA.left;
      if (cd.x > ARENA.right) cd.x = ARENA.right;
      if (cd.y > GROUND - 10) {
        cd.y = GROUND - 10;
        if (Math.abs(cd.vy) > 1.4) { cd.vy = -cd.vy * 0.45; }
        else { cd.vy = 0; cd.vx = 0; }
      }
      if (cd.t > 720) cd.alive = false;     // ~12 с — и монета исчезает
      const cbox = { x: cd.x - 12, y: cd.y - 12, w: 24, h: 24 };
      for (const f of this.fighters) {
        if (!cd.alive || !f.ctrl.human) continue;   // ИИ монеты не берёт
        if (this.overlap(cbox, f.hurtbox())) {
          cd.alive = false;
          profile.coins += cd.rar.coins; saveProfile();
          this.floater(cd.x - camera.x, cd.y - 26,
            "+" + cd.rar.coins + (cd.rar.coins === 1 ? " монета" :
              cd.rar.coins === 3 ? " монеты" : " монет"), cd.rar.color);
          this.spark(cd.x, cd.y);
        }
      }
    }
    this.coinDrops = this.coinDrops.filter(c => c.alive);
    for (const ch of this.chips) {
      ch.t++; ch.vy += 0.5; ch.x += ch.vx; ch.y += ch.vy;
    }
    this.chips = this.chips.filter(c => c.t < 30 && c.y < GROUND + 10);
    for (const pj of this.projectiles) {
      pj.t++; pj.x += pj.vx;
      if (pj.x < -40 || pj.x > W + 40) pj.alive = false;
      const pr = PROJ[pj.kind];
      const target = this.opponent(pj.owner);
      const box = { x: pj.x - pr.size / 2, y: pj.y - pr.size / 2,
                    w: pr.size, h: pr.size };
      if (pj.alive && this.overlap(box, target.hurtbox())) {
        const fake = { dmg: Math.round(pr.dmg * pj.owner.dmgMul),
                       kb: pr.kb, stun: pr.stun, knockdown: false };
        if (target.applyHit(fake, pj.x - pj.vx * 4)) {
          this.spark(pj.x, pj.y);
          this.shake = 4;
        }
        pj.alive = false;
      }
    }
    this.projectiles = this.projectiles.filter(s => s.alive);
    for (const sp of this.sparks) sp.t++;
    this.sparks = this.sparks.filter(s => s.t < 8);
    if (this.shake > 0) this.shake--;
    // тела не проходят друг сквозь друга
    const [a, b] = this.fighters;
    if (a && b && Math.abs(a.x - b.x) < 40 &&
        !(a.state === ST.KO || b.state === ST.KO)) {
      const push = (a.x < b.x) ? -1 : 1;
      a.x += push * 1.5; b.x -= push * 1.5;
    }
    if (a && b) {   // оба всегда в кадре: не даём разбежаться
      const L = (a.x < b.x) ? a : b, R = (a.x < b.x) ? b : a;
      if (R.x - L.x > 820) { L.x += 1.4; R.x -= 1.4; }
    }
  },
  drawBack() {                        // ящики — за спинами бойцов
    for (const cr of this.crates) {
      if (cr.landed) {
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.beginPath();
        ctx.ellipse(cr.x, GROUND + 6, 34, 7, 0, 0, 7);
        ctx.fill();
      }
      const wob = (cr.flash > 0) ? cr.dir * ((cr.flash % 2) ? 2 : -2) : 0;
      ctx.drawImage((cr.flash > 0) ? CRATE_WHITE : CRATE_IMG,
        cr.x - CR_GW * CR_S / 2 + wob, cr.y, CR_GW * CR_S, CR_GH * CR_S);
    }
  },
  draw() {
    for (const cd of this.coinDrops) {          // монеты из ящиков
      if (cd.t > 600 && Math.floor(cd.t / 5) % 2) continue;   // мигает
      ctx.globalAlpha = 0.22 + 0.12 * Math.sin(cd.t * 0.18);
      ctx.fillStyle = cd.rar.color;
      ctx.beginPath(); ctx.arc(cd.x, cd.y, 17, 0, 7); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.save();
      ctx.translate(cd.x, cd.y);
      const sx = Math.cos(cd.t * 0.1) || 0.05;  // монетка крутится
      ctx.scale(sx, 1);
      ctx.drawImage(cd.rar.img, -10, -10, 21, 21);
      ctx.restore();
    }
    for (const ch of this.chips) {              // щепки
      ctx.fillStyle = ch.c;
      ctx.fillRect(ch.x - 2, ch.y - 2, 4, 4);
    }
    for (const pj of this.projectiles) {
      if (pj.kind === "shuriken") {
        const img = SHU_IMG[Math.floor(pj.t / 4) % 2];
        ctx.drawImage(img, pj.x - 7, pj.y - 7, 15, 15);
      } else {
        ctx.save();
        ctx.translate(pj.x, pj.y);
        if (pj.vx < 0) ctx.scale(-1, 1);
        if (pj.kind === "arrow") ctx.drawImage(ARROW_IMG, -15, -4, 30, 9);
        else ctx.drawImage(KUNAI_IMG, -12, -4, 24, 9);
        ctx.restore();
      }
    }
    for (const sp of this.sparks) {
      const r = 4 + sp.t * 2.2;
      ctx.fillStyle = (sp.t % 2) ? "#fff3b0" : "#ffffff";
      ctx.fillRect(sp.x - r / 2, sp.y - r / 2, r, r / 3);
      ctx.fillRect(sp.x - r / 6, sp.y - r / 2, r / 3, r);
    }
  }
};

/* ============================================================
   ИГРА: раунды, HUD, надписи, главный цикл.
   ============================================================ */
const game = {
  mode: "menu",
  timer: 0, round: 1, wins: [0, 0], msg: "",
  menuSel: 0, shopSel: 0, outfitSel: 0, shopFor: 0, outfitFor: 0, matchPaid: false,
  heroSel: 0, heroFor: 0, powerSel: 0,
  vsMode: false, arenaIdx: 0,
  p1: null, p2: null,

  init() {
    this.p1 = new Fighter(620, "p1", P1_NAME, new HumanController([keyPad1, keyPad2, touchPad]));
    this.p2 = new Fighter(1300, "p2", P2_NAME, new AIController());
    world.fighters = [this.p1, this.p2];
    this.arenaIdx = (profile.arena < THEMES.length) ? profile.arena : 0;
  },
  newMatch(vs) {
    this.vsMode = !!vs;
    this.wins = [0, 0]; this.round = 1; this.matchPaid = false;
    this.arenaIdx = (profile.arena < THEMES.length) ? profile.arena
                  : Math.floor(Math.random() * THEMES.length);
    this.p1.ctrl = new HumanController(this.vsMode
      ? [keyPad1, touchPad] : [keyPad1, keyPad2, touchPad]);
    this.p2.ctrl = this.vsMode ? new HumanController([keyPad2]) : new AIController();
    this.p1.name = HEROES[profile.hero].name;
    this.p2.name = this.vsMode ? HEROES[profile.hero2].name : P2_NAME;
    this.p2.pal  = this.vsMode ? "p2c" : "p2";
    this.p1.hook = !!HEROES[profile.hero].hook;
    this.p2.hook = this.vsMode && !!HEROES[profile.hero2].hook;
    this.newRound();
  },
  newRound() {
    /* очки силы (v0.7): здоровье и урон живых игроков */
    const pw = profile.power;
    this.p1.maxHp = HP_MAX + pw.hp * 8;
    this.p1.dmgMul = 1 + pw.dmg * 0.08;
    this.p2.maxHp = this.vsMode ? this.p1.maxHp : HP_MAX;
    this.p2.dmgMul = this.vsMode ? this.p1.dmgMul : 1;
    this.p1.reset(620, 1); this.p2.reset(1300, -1);
    const sane = (eq, hero) => (eq === "hook" &&
      profile.owned.indexOf("hook") < 0 && !HEROES[hero].hook) ? "fist" : eq;
    this.p1.weapon = sane(profile.equipped, profile.hero);
    this.p2.weapon = this.vsMode ? sane(profile.equipped2, profile.hero2)
                                 : DIFFS[profile.difficulty].weapon;
    world.projectiles = []; world.sparks = []; world.floaters = [];
    world.crates = []; world.coinDrops = []; world.chips = [];
    world.crateTimer = CRATE_FIRST[0] +
      Math.floor(Math.random() * (CRATE_FIRST[1] - CRATE_FIRST[0]));
    clearPads();
    this.mode = "intro"; this.timer = 70;
  },

  menuItems() {
    return ["В БОЙ (ПРОТИВ СЕНСЕЯ)",
            "ВДВОЁМ (ДВА ИГРОКА)",
            "ГЕРОИ: " + HEROES[profile.hero].name + " · " + HEROES[profile.hero2].name,
            "МАГАЗИН", "ПРОКАЧКА", "КУБКИ",
            "ОДЕЖДА: " + OUTFITS[profile.outfit].name,
            "СЛОЖНОСТЬ: " + DIFFS[profile.difficulty].name,
            "КАРТА: " + (profile.arena < THEMES.length
                         ? THEMES[profile.arena].name : "СЛУЧАЙНАЯ")];
  },

  isNight() {
    const ph = (cycleT % CYCLE_LEN) / CYCLE_LEN;
    return ph > 0.57 && ph < 0.93;
  },
  gainXp(amount) {
    const before = levelInfo(profile.xp).level;
    profile.xp += amount;
    world.floater(W / 2, 186, "+" + amount + " опыта", "#7ec8ff");
    const after = levelInfo(profile.xp).level;
    if (after > before) {
      profile.coins += LEVELUP_COINS;
      world.floater(W / 2, 222, "УРОВЕНЬ " + after + "! +" + LEVELUP_COINS + " монет", "#e8c15a");
    }
    saveProfile();
  },
  awardCup(id) {
    if (profile.trophies.indexOf(id) >= 0) return;
    profile.trophies.push(id); saveProfile();
    world.floater(W / 2, 258, "КУБОК: " + TROPHIES[id].title + "!", "#ffd98a");
  },

  handleUI(ev) {
    if (this.mode === "menu") {
      const n = this.menuItems().length;
      if (ev.type === "up")   this.menuSel = (this.menuSel + n - 1) % n;
      if (ev.type === "down") this.menuSel = (this.menuSel + 1) % n;
      if (ev.type === "click") {
        const hit = this.rowAt(ev.y, 176, 33, n);
        if (hit < 0) return;
        this.menuSel = hit; ev = { type: "ok" };
      }
      if (ev.type === "ok") {
        if (this.menuSel === 0) this.newMatch(false);
        else if (this.menuSel === 1) this.newMatch(true);
        else if (this.menuSel === 2) { this.mode = "heroes"; this.heroSel = 1 + profile.hero; }
        else if (this.menuSel === 3) { this.mode = "shop"; this.shopSel = 0; }
        else if (this.menuSel === 4) { this.mode = "power"; this.powerSel = 0; }
        else if (this.menuSel === 5) this.mode = "cups";
        else if (this.menuSel === 6) { this.mode = "outfit"; this.outfitSel = profile.outfit; }
        else if (this.menuSel === 7) {
          profile.difficulty = (profile.difficulty + 1) % DIFFS.length;
          saveProfile();
        } else {
          profile.arena = (profile.arena + 1) % (THEMES.length + 1);
          this.arenaIdx = (profile.arena < THEMES.length) ? profile.arena : 0;
          saveProfile();
        }
      }
    } else if (this.mode === "outfit") {
      const n = OUTFITS.length + 2;
      if (ev.type === "up")   this.outfitSel = (this.outfitSel + n - 1) % n;
      if (ev.type === "down") this.outfitSel = (this.outfitSel + 1) % n;
      if (ev.type === "back") { this.mode = "menu"; return; }
      if (ev.type === "click") {
        const hit = this.rowAt(ev.y, 150, 46, n);
        if (hit < 0) return;
        this.outfitSel = hit; ev = { type: "ok" };
      }
      if (ev.type === "ok") {
        if (this.outfitSel === 0) { this.outfitFor = 1 - this.outfitFor; return; }
        if (this.outfitSel === OUTFITS.length + 1) { this.mode = "menu"; return; }
        if (this.outfitFor === 0) { profile.outfit = this.outfitSel - 1; applyOutfit(); }
        else { profile.outfit2 = this.outfitSel - 1; applyOutfit2(); }
        saveProfile();
      }
    } else if (this.mode === "heroes") {
      const n = HEROES.length + 2;
      if (ev.type === "up")   this.heroSel = (this.heroSel + n - 1) % n;
      if (ev.type === "down") this.heroSel = (this.heroSel + 1) % n;
      if (ev.type === "back") { this.mode = "menu"; return; }
      if (ev.type === "click") {
        const hit = this.rowAt(ev.y, 150, 46, n);
        if (hit < 0) return;
        this.heroSel = hit; ev = { type: "ok" };
      }
      if (ev.type === "ok") {
        if (this.heroSel === 0) { this.heroFor = 1 - this.heroFor; return; }
        if (this.heroSel === HEROES.length + 1) { this.mode = "menu"; return; }
        if (this.heroFor === 0) { profile.hero = this.heroSel - 1; applyOutfit(); }
        else { profile.hero2 = this.heroSel - 1; applyOutfit2(); }
        saveProfile();
      }
    } else if (this.mode === "power") {
      const n = 3;                       // здоровье, удар, назад
      if (ev.type === "up")   this.powerSel = (this.powerSel + n - 1) % n;
      if (ev.type === "down") this.powerSel = (this.powerSel + 1) % n;
      if (ev.type === "back") { this.mode = "menu"; return; }
      if (ev.type === "click") {
        const hit = this.rowAt(ev.y, 210, 56, n);
        if (hit < 0) return;
        this.powerSel = hit; ev = { type: "ok" };
      }
      if (ev.type === "ok") {
        if (this.powerSel === 2) { this.mode = "menu"; return; }
        const pw = profile.power, key = (this.powerSel === 0) ? "hp" : "dmg";
        if (pw.pts > 0 && pw[key] < 5) {
          pw.pts--; pw[key]++;
          saveProfile();
          world.floater(W / 2, 170, "ПРОКАЧАНО!", "#7ec8ff");
        }
      }
    } else if (this.mode === "shop") {
      const n = WEAPON_ORDER.length + 2;
      if (ev.type === "up")   this.shopSel = (this.shopSel + n - 1) % n;
      if (ev.type === "down") this.shopSel = (this.shopSel + 1) % n;
      if (ev.type === "back") { this.mode = "menu"; return; }
      if (ev.type === "click") {
        const hit = this.rowAt(ev.y, 150, 50, n);
        if (hit < 0) return;
        this.shopSel = hit; ev = { type: "ok" };
      }
      if (ev.type === "ok") {
        if (this.shopSel === 0) { this.shopFor = 1 - this.shopFor; return; }
        if (this.shopSel === WEAPON_ORDER.length + 1) { this.mode = "menu"; return; }
        const id = WEAPON_ORDER[this.shopSel - 1];
        const wp = WEAPONS[id];
        const ownedEff = profile.owned.indexOf(id) >= 0 ||
                         (id === "hook" &&
                          HEROES[this.shopFor === 0 ? profile.hero : profile.hero2].hook);
        if (ownedEff) {
          if (this.shopFor === 0) profile.equipped = id; else profile.equipped2 = id;
          saveProfile();
        } else if (profile.coins >= wp.price) {
          profile.coins -= wp.price;
          profile.owned.push(id);
          if (this.shopFor === 0) profile.equipped = id; else profile.equipped2 = id;
          saveProfile();
          if (WEAPON_ORDER.every(w => profile.owned.indexOf(w) >= 0)) this.awardCup("arsenal");
        }
      }
    } else if (this.mode === "cups") {
      if (ev.type === "ok" || ev.type === "back" || ev.type === "click")
        this.mode = "menu";
    } else if (this.mode === "matchend") {
      if (ev.type === "ok" || ev.type === "click") this.mode = "menu";
    }
  },
  rowAt(y, y0, step, n) {
    for (let i = 0; i < n; i++) {
      if (Math.abs(y - (y0 + i * step) + 10) < step / 2 - 4) return i;
    }
    return -1;
  },

  tick() {
    cycleT++;
    updateTouchPad();
    world.tickFloaters();
    for (const ev of uiEvents.splice(0)) this.handleUI(ev);

    if (this.mode === "menu" || this.mode === "shop" ||
        this.mode === "cups" || this.mode === "outfit" ||
        this.mode === "heroes" || this.mode === "power") return;
    if (this.mode === "intro") {
      if (--this.timer <= 0) { this.mode = "fight"; this.timer = 45; }
      return;
    }
    if (this.mode === "fight") {
      if (--this.timer <= 0) this.mode = "play";
      return;
    }
    if (this.mode === "play" || this.mode === "ko") {
      this.p1.ctrl.update(this.p1, this.p2);
      this.p2.ctrl.update(this.p2, this.p1);
      this.p1.update(world);
      this.p2.update(world);
      world.update();
    }
    if (this.mode === "play") {
      const dead1 = this.p1.state === ST.KO, dead2 = this.p2.state === ST.KO;
      if (dead1 || dead2) {
        this.mode = "ko"; this.timer = 120;
        if (dead1 && dead2) this.msg = "НИЧЬЯ";
        else if (dead2) {
          this.wins[0]++; this.msg = this.p1.name + " ПОБЕЖДАЕТ";
          if (!this.vsMode) {
            profile.coins += COIN_ROUND; saveProfile();
            world.floater(W / 2, 150, "+" + COIN_ROUND + " монет", "#e8c15a");
            this.gainXp(XP_ROUND);
            if (this.p1.hp === this.p1.maxHp) this.awardCup("perfect");
            if (this.isNight()) this.awardCup("night");
          }
        } else { this.wins[1]++; this.msg = this.p2.name + " ПОБЕЖДАЕТ"; }
      }
    } else if (this.mode === "ko") {
      if (--this.timer <= 0) {
        if (this.wins[0] >= WINS_NEEDED || this.wins[1] >= WINS_NEEDED) {
          if (!this.vsMode && this.wins[0] >= WINS_NEEDED && !this.matchPaid) {
            this.matchPaid = true;
            profile.coins += COIN_MATCH;
            profile.power.pts++;
            world.floater(W / 2, 122, "+1 ОЧКО СИЛЫ", "#9be07a");
            profile.matchesWon++; profile.winStreak++;
            this.gainXp(XP_MATCH);
            this.awardCup("firstwin");
            if (profile.winStreak >= 3) this.awardCup("streak3");
            if (profile.matchesWon >= 10) this.awardCup("champ10");
            saveProfile();
          } else if (!this.vsMode && this.wins[1] >= WINS_NEEDED && !this.matchPaid) {
            this.matchPaid = true;
            profile.winStreak = 0;
            this.gainXp(XP_LOSS);
            saveProfile();
          }
          this.mode = "matchend";
        } else { this.round++; this.newRound(); }
      }
    }
  },

  drawCoins(x, y) {
    ctx.drawImage(COIN_IMG, x, y, 21, 21);
    ctx.font = "bold 22px 'Courier New', monospace";
    ctx.textAlign = "left"; ctx.fillStyle = "#e8c15a";
    ctx.fillText(String(profile.coins), x + 28, y + 18);
  },

  drawHUD() {
    const bw = 380, bh = 22;
    ctx.fillStyle = "#191722";
    ctx.fillRect(28, 24, bw + 4, bh + 4);
    ctx.fillRect(W - 32 - bw, 24, bw + 4, bh + 4);
    ctx.fillStyle = "#a03a30";
    const c1 = bw * this.p1.dispHp / this.p1.maxHp, c2 = bw * this.p2.dispHp / this.p2.maxHp;
    ctx.fillRect(30 + (bw - c1), 26, c1, bh);
    ctx.fillRect(W - 30 - bw, 26, c2, bh);
    ctx.fillStyle = "#46c85a";
    const w1 = bw * this.p1.hp / this.p1.maxHp, w2 = bw * this.p2.hp / this.p2.maxHp;
    ctx.fillRect(30 + (bw - w1), 26, w1, bh);
    ctx.fillRect(W - 30 - bw, 26, w2, bh);
    ctx.font = "bold 18px 'Courier New', monospace";
    ctx.fillStyle = "#f2ead8"; ctx.textAlign = "left";
    ctx.fillText(this.p1.name + "  " + this.p1.hp + "/" + this.p1.maxHp, 32, 70);
    ctx.textAlign = "right";
    ctx.fillText(this.p2.hp + "/" + this.p2.maxHp + "  " + this.p2.name, W - 32, 70);
    for (let i = 0; i < WINS_NEEDED; i++) {
      ctx.fillStyle = (this.wins[0] > i) ? "#e8c15a" : "#3a3c58";
      ctx.fillRect(W / 2 - 40 - i * 22, 28, 14, 14);
      ctx.fillStyle = (this.wins[1] > i) ? "#e8c15a" : "#3a3c58";
      ctx.fillRect(W / 2 + 26 + i * 22, 28, 14, 14);
    }
    this.drawCoins(W / 2 - 34, 48);   // кошелёк виден прямо в бою
  },

  drawMarker(f, color) {
    const sx = f.x - camera.x, ty = GROUND - 214 + f.yOff;
    ctx.font = "bold 13px 'Courier New', monospace";
    ctx.textAlign = "center"; ctx.fillStyle = color;
    ctx.fillText(f.name, sx, ty);
    ctx.beginPath();
    ctx.moveTo(sx - 7, ty + 5); ctx.lineTo(sx + 7, ty + 5);
    ctx.lineTo(sx, ty + 15); ctx.closePath(); ctx.fill();
  },

  banner(txt, size, y) {
    ctx.font = "bold " + size + "px 'Courier New', monospace";
    ctx.textAlign = "center";
    ctx.fillStyle = "#191722";
    ctx.fillText(txt, W / 2 + 4, y + 4);
    ctx.fillStyle = "#f2ead8";
    ctx.fillText(txt, W / 2, y);
  },

  drawTouchUI() {                      // полупрозрачный стик и кнопки
    const ax = (stick.id >= 0) ? stick.ox : 150;
    const ay = (stick.id >= 0) ? stick.oy : H - 130;
    ctx.globalAlpha = 0.26;
    ctx.fillStyle = "#cfd2e8";
    ctx.beginPath(); ctx.arc(ax, ay, 52, 0, 7); ctx.fill();
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = "#f2ead8";
    const kx = ax + Math.max(-40, Math.min(40, stick.dx));
    const ky = ay + Math.max(-40, Math.min(40, stick.dy));
    ctx.beginPath(); ctx.arc(kx, ky, 24, 0, 7); ctx.fill();
    ctx.font = "bold 16px 'Courier New', monospace"; ctx.textAlign = "center";
    for (let i = 0; i < TBTNS.length; i++) {
      const r = tbtnRect(i), on = touchPad[TBTNS[i].a];
      ctx.globalAlpha = on ? 0.6 : 0.26;
      ctx.fillStyle = on ? "#e8c15a" : "#cfd2e8";
      ctx.fillRect(r.x, r.y, r.w, r.h);
      ctx.globalAlpha = 0.9;
      ctx.fillStyle = "#0d0e18";
      ctx.fillText(TBTNS[i].t, r.x + r.w / 2, r.y + r.h / 2 + 6);
    }
    ctx.globalAlpha = 1;
  },

  drawHeroes() {
    ctx.fillStyle = "rgba(10,10,22,0.75)"; ctx.fillRect(0, 0, W, H);
    this.banner("ГЕРОИ", 46, 92);
    const cur = this.heroFor === 0 ? profile.hero : profile.hero2;
    ctx.font = "bold 24px 'Courier New', monospace"; ctx.textAlign = "left";
    ctx.fillStyle = (this.heroSel === 0) ? "#e8c15a" : "#7ec8ff";
    ctx.fillText((this.heroSel === 0 ? "▶ " : "  ") + "ВЫБИРАЕТ: ИГРОК " +
                 (this.heroFor + 1) + " ⇄", W / 2 - 240, 150);
    for (let i = 0; i < HEROES.length; i++) {
      const y = 196 + i * 46;
      ctx.font = "bold 24px 'Courier New', monospace"; ctx.textAlign = "left";
      ctx.fillStyle = (i + 1 === this.heroSel) ? "#e8c15a" : "#f2ead8";
      ctx.fillText((i + 1 === this.heroSel ? "▶ " : "  ") + HEROES[i].name +
                   (HEROES[i].hook ? " (свой крюк)" : ""), W / 2 - 240, y);
      if (i === cur) {
        ctx.fillStyle = "#7ec8ff"; ctx.font = "bold 17px 'Courier New', monospace";
        ctx.fillText("ВЫБРАН", W / 2 + 60, y);
      }
    }
    const yb = 196 + HEROES.length * 46;
    ctx.font = "bold 24px 'Courier New', monospace"; ctx.textAlign = "left";
    ctx.fillStyle = (this.heroSel === HEROES.length + 1) ? "#e8c15a" : "#f2ead8";
    ctx.fillText((this.heroSel === HEROES.length + 1 ? "▶ " : "  ") + "НАЗАД", W / 2 - 240, yb);
    ctx.drawImage(FRAMES[this.heroFor === 0 ? "p1" : "p2c"].idle.img,
                  W / 2 + 150, 150, GW * 5, GH * 5);
    ctx.font = "15px 'Courier New', monospace";
    ctx.fillStyle = "#aab0d0"; ctx.textAlign = "center";
    ctx.fillText("цвет одежды героя меняется в меню ОДЕЖДА", W / 2, yb + 40);
    world.drawFloaters();
  },

  drawPower() {
    ctx.fillStyle = "rgba(10,10,22,0.75)"; ctx.fillRect(0, 0, W, H);
    this.banner("ПРОКАЧКА", 44, 92);
    const pw = profile.power;
    ctx.font = "bold 24px 'Courier New', monospace"; ctx.textAlign = "center";
    ctx.fillStyle = "#9be07a";
    ctx.fillText("ОЧКИ СИЛЫ: " + pw.pts + "  (+1 за победу в матче с СЕНСЕЕМ)", W / 2, 154);
    const rows = [
      { t: "ЗДОРОВЬЕ",   lv: pw.hp,  d: "+8 макс. здоровья за очко" },
      { t: "СИЛА УДАРА", lv: pw.dmg, d: "+8% урона за очко" },
    ];
    for (let i = 0; i < rows.length; i++) {
      const y = 210 + i * 56, r = rows[i];
      ctx.font = "bold 25px 'Courier New', monospace"; ctx.textAlign = "center";
      ctx.fillStyle = (i === this.powerSel) ? "#e8c15a"
                    : (pw.pts === 0 || r.lv >= 5) ? "#787c9c" : "#f2ead8";
      ctx.fillText((i === this.powerSel ? "▶ " : "") + r.t + ": " +
                   "★".repeat(r.lv) + "☆".repeat(5 - r.lv) +
                   (r.lv >= 5 ? " МАКС" : ""), W / 2, y);
      ctx.font = "14px 'Courier New', monospace"; ctx.fillStyle = "#aab0d0";
      ctx.fillText(r.d, W / 2, y + 20);
    }
    const yb = 210 + rows.length * 56;
    ctx.font = "bold 25px 'Courier New', monospace"; ctx.textAlign = "center";
    ctx.fillStyle = (this.powerSel === 2) ? "#e8c15a" : "#f2ead8";
    ctx.fillText((this.powerSel === 2 ? "▶ " : "") + "НАЗАД", W / 2, yb);
    ctx.font = "15px 'Courier New', monospace"; ctx.fillStyle = "#aab0d0";
    ctx.fillText("прокачка у живых игроков — у СЕНСЕЯ всегда 100 здоровья", W / 2, yb + 36);
    world.drawFloaters();
  },

  drawMenu() {
    ctx.fillStyle = "rgba(10,10,22,0.55)";
    ctx.fillRect(0, 0, W, H);
    this.banner("SAMURAI DUEL", 56, 140);
    const items = this.menuItems();
    ctx.font = "bold 25px 'Courier New', monospace"; ctx.textAlign = "center";
    for (let i = 0; i < items.length; i++) {
      ctx.fillStyle = (i === this.menuSel) ? "#e8c15a" : "#f2ead8";
      ctx.fillText((i === this.menuSel ? "▶ " : "") + items[i] +
                   (i === this.menuSel ? " ◀" : ""), W / 2, 176 + i * 33);
    }
    this.drawStatus(456);
    ctx.font = "14px 'Courier New', monospace";
    ctx.fillStyle = "#aab0d0"; ctx.textAlign = "center";
    ctx.fillText("1-й (слева): A D шаг · W прыжок · S блок · F G H R T Y — атаки", W / 2, 500);
    ctx.fillText("2-й (справа): ←→ шаг · ↑ прыжок · ↓ блок · J K L U I O — атаки", W / 2, 518);
    ctx.textAlign = "right";
    ctx.fillText("v0.7 · игра Пети", W - 16, H - 6);
    world.drawFloaters();
  },

  drawStatus(y) {
    const li = levelInfo(profile.xp);
    ctx.font = "bold 20px 'Courier New', monospace"; ctx.textAlign = "left";
    ctx.fillStyle = "#7ec8ff";
    ctx.fillText("УР. " + li.level, W / 2 - 230, y + 16);
    ctx.fillStyle = "#191722";
    ctx.fillRect(W / 2 - 150, y + 3, 124, 14);
    ctx.fillStyle = "#7ec8ff";
    ctx.fillRect(W / 2 - 148, y + 5, 120 * li.into / li.need, 10);
    this.drawCoins(W / 2 + 6, y);
    ctx.drawImage(CUP_IMG, W / 2 + 116, y - 1, 33, 27);
    ctx.font = "bold 20px 'Courier New', monospace";
    ctx.fillStyle = "#ffd98a"; ctx.textAlign = "left";
    ctx.fillText(profile.trophies.length + "/" + TROPHY_ORDER.length, W / 2 + 156, y + 16);
  },

  drawOutfit() {
    ctx.fillStyle = "rgba(10,10,22,0.75)"; ctx.fillRect(0, 0, W, H);
    this.banner("ОДЕЖДА", 46, 92);
    const cur = this.outfitFor === 0 ? profile.outfit : profile.outfit2;
    ctx.font = "bold 24px 'Courier New', monospace"; ctx.textAlign = "left";
    ctx.fillStyle = (this.outfitSel === 0) ? "#e8c15a" : "#7ec8ff";
    ctx.fillText((this.outfitSel === 0 ? "▶ " : "  ") + "ОДЕВАЕМ: ИГРОК " +
                 (this.outfitFor + 1) + " ⇄", W / 2 - 240, 150);
    for (let i = 0; i < OUTFITS.length; i++) {
      const y = 196 + i * 46;
      ctx.font = "bold 24px 'Courier New', monospace"; ctx.textAlign = "left";
      ctx.fillStyle = (i + 1 === this.outfitSel) ? "#e8c15a" : "#f2ead8";
      ctx.fillText((i + 1 === this.outfitSel ? "▶ " : "  ") + OUTFITS[i].name, W / 2 - 240, y);
      if (i === cur) {
        ctx.fillStyle = "#7ec8ff"; ctx.font = "bold 17px 'Courier New', monospace";
        ctx.fillText("НАДЕТО", W / 2 + 10, y);
      }
    }
    const yb = 196 + OUTFITS.length * 46;
    ctx.font = "bold 24px 'Courier New', monospace"; ctx.textAlign = "left";
    ctx.fillStyle = (this.outfitSel === OUTFITS.length + 1) ? "#e8c15a" : "#f2ead8";
    ctx.fillText((this.outfitSel === OUTFITS.length + 1 ? "▶ " : "  ") + "НАЗАД", W / 2 - 240, yb);
    ctx.drawImage(FRAMES[this.outfitFor === 0 ? "p1" : "p2c"].idle.img,
                  W / 2 + 150, 150, GW * 5, GH * 5);
    ctx.font = "15px 'Courier New', monospace";
    ctx.fillStyle = "#aab0d0"; ctx.textAlign = "center";
    ctx.fillText("ENTER — надеть · ESC — назад", W / 2, yb + 40);
    world.drawFloaters();
  },

  drawShop() {
    ctx.fillStyle = "rgba(10,10,22,0.72)"; ctx.fillRect(0, 0, W, H);
    this.banner("МАГАЗИН", 44, 88);
    this.drawCoins(W - 180, 40);
    ctx.font = "bold 24px 'Courier New', monospace"; ctx.textAlign = "center";
    ctx.fillStyle = (this.shopSel === 0) ? "#e8c15a" : "#7ec8ff";
    ctx.fillText((this.shopSel === 0 ? "▶ " : "") + "ПОКУПАЕТ: ИГРОК " +
                 (this.shopFor + 1) + " ⇄", W / 2, 150);
    for (let i = 0; i < WEAPON_ORDER.length; i++) {
      const id = WEAPON_ORDER[i], wp = WEAPONS[id];
      const y = 200 + i * 50;
      const ownedEff = profile.owned.indexOf(id) >= 0 ||
                       (id === "hook" &&
                        HEROES[this.shopFor === 0 ? profile.hero : profile.hero2].hook);
      const eq = (this.shopFor === 0 ? profile.equipped : profile.equipped2) === id;
      const right = ownedEff ? (eq ? "ВЫБРАНО" : "выбрать") : (wp.price + " монет");
      ctx.font = "bold 25px 'Courier New', monospace"; ctx.textAlign = "center";
      ctx.fillStyle = (i + 1 === this.shopSel) ? "#e8c15a"
                    : (!ownedEff && profile.coins < wp.price) ? "#787c9c" : "#f2ead8";
      ctx.fillText((i + 1 === this.shopSel ? "▶ " : "") + wp.title + " — " + right, W / 2, y);
      ctx.beginPath(); ctx.arc(W / 2 - 300, y + 13, 9, 0, 7);
      ctx.fillStyle = "#3a5a8c"; ctx.fill();
      ctx.font = "bold 14px 'Courier New', monospace";
      ctx.fillStyle = "#cfe0ff"; ctx.fillText("i", W / 2 - 300, y + 18);
      ctx.font = "14px 'Courier New', monospace"; ctx.fillStyle = "#aab0d0";
      ctx.fillText("тип: " + (wp.type === "proj" ? "снаряд" : "ближний бой") +
                   " · урон " + wp.dmg + " · замах " + wp.startup + " тиков", W / 2, y + 18);
    }
    const yb = 200 + WEAPON_ORDER.length * 50;
    ctx.font = "bold 25px 'Courier New', monospace";
    ctx.fillStyle = (this.shopSel === WEAPON_ORDER.length + 1) ? "#e8c15a" : "#f2ead8";
    ctx.fillText((this.shopSel === WEAPON_ORDER.length + 1 ? "▶ " : "") + "НАЗАД", W / 2, yb);
    ctx.font = "14px 'Courier New', monospace"; ctx.fillStyle = "#aab0d0";
    ctx.fillText("монеты общие · у героя КРОКОДАЙЛ свой крюк, бесплатный", W / 2, yb + 32);
    world.drawFloaters();
  },

  drawCups() {
    ctx.fillStyle = "rgba(10,10,22,0.78)";
    ctx.fillRect(0, 0, W, H);
    this.banner("КУБКИ", 52, 96);
    for (let i = 0; i < TROPHY_ORDER.length; i++) {
      const id = TROPHY_ORDER[i], tr = TROPHIES[id];
      const got = profile.trophies.indexOf(id) >= 0;
      const y = 156 + i * 54;
      ctx.drawImage(got ? CUP_IMG : CUP_OFF, W / 2 - 268, y - 22, 33, 27);
      ctx.font = "bold 24px 'Courier New', monospace"; ctx.textAlign = "left";
      ctx.fillStyle = got ? "#f2ead8" : "#787c9c";
      ctx.fillText(tr.title, W / 2 - 222, y);
      ctx.font = "15px 'Courier New', monospace";
      ctx.fillStyle = "#aab0d0";
      ctx.fillText(tr.desc, W / 2 - 222, y + 20);
      ctx.font = "bold 20px 'Courier New', monospace"; ctx.textAlign = "right";
      ctx.fillStyle = got ? "#ffd98a" : "#3a3c58";
      ctx.fillText(got ? "ПОЛУЧЕН" : "— — —", W / 2 + 268, y);
    }
    ctx.font = "16px 'Courier New', monospace";
    ctx.fillStyle = "#aab0d0"; ctx.textAlign = "center";
    ctx.fillText("ENTER или ESC — назад", W / 2, 156 + TROPHY_ORDER.length * 54 + 16);
    world.drawFloaters();
  },

  draw() {
    const inFight = ["intro", "fight", "play", "ko", "matchend"].indexOf(this.mode) >= 0;
    camera.x = inFight
      ? Math.max(0, Math.min(WORLD_W - W, (this.p1.x + this.p2.x) / 2 - W / 2))
      : (WORLD_W - W) / 2;
    ctx.save();
    if (world.shake > 0) {
      ctx.translate((Math.random() - 0.5) * world.shake * 2,
                    (Math.random() - 0.5) * world.shake * 2);
    }
    ARENA.draw(cycleT, this.arenaIdx, camera.x);

    if (this.mode === "menu")   { this.drawMenu();   ctx.restore(); return; }
    if (this.mode === "heroes") { this.drawHeroes(); ctx.restore(); return; }
    if (this.mode === "power")  { this.drawPower();  ctx.restore(); return; }
    if (this.mode === "shop")   { this.drawShop();   ctx.restore(); return; }
    if (this.mode === "cups")   { this.drawCups();   ctx.restore(); return; }
    if (this.mode === "outfit") { this.drawOutfit(); ctx.restore(); return; }

    ctx.save();
    ctx.translate(-camera.x, 0);      // мир под камерой
    world.drawBack();                 // ящики — позади бойцов
    this.p2.draw();
    this.p1.draw();
    world.draw();
    ctx.restore();
    this.drawMarker(this.p1, "#ffd84a");   // стрелки-указатели
    this.drawMarker(this.p2, "#ff7a5c");
    world.drawFloaters();
    this.drawHUD();
    if (TOUCH_ON && FIGHT_MODES[this.mode]) this.drawTouchUI();

    if (this.mode === "intro") {
      this.banner("РАУНД " + this.round, 64, 260);
      this.banner(THEMES[this.arenaIdx].name, 22, 300);
    }
    if (this.mode === "fight") this.banner("БОЙ!", 80, 270);
    if (this.mode === "ko") {
      this.banner("K.O.", 96, 250);
      this.banner(this.msg, 30, 310);
    }
    if (this.mode === "matchend") {
      const pWin = this.wins[0] >= WINS_NEEDED;
      this.banner((pWin ? this.p1.name : this.p2.name) + " — ПОБЕДА В МАТЧЕ!", 42, 240);
      if (pWin && !this.vsMode) this.banner("+" + COIN_MATCH + " монет за матч", 24, 286);
      this.banner("ENTER — в меню", 24, 330);
    }
    ctx.restore();
  }
};

let cycleT = 900;   // старт суток — утро
game.init();

/* ---------- ЦИКЛ: логика на фиксированном шаге --------------- */
let last = performance.now(), acc = 0;
function loop(now) {
  acc += Math.min(100, now - last);
  last = now;
  while (acc >= STEP) { game.tick(); acc -= STEP; }
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);   // HiDPI-масштаб (v0.6)
  ctx.imageSmoothingEnabled = false;
  game.draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
